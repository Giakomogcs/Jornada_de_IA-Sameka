openapi: 3.0.3
info:
  title: API Oporttuna - Inteligência Comercial
  version: 1.0.0
  description: >
    Endpoints de autenticação e inteligência comercial para consulta de leads por cidade.

servers:
  - url: https://oporttuna.com.br/portal-api-hmg

paths:
  /auth/login:
    post:
      tags:
        - Autenticação
      summary: Login
      description: Autentica o usuário e retorna um token JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - senha
              properties:
                email:
                  type: string
                  format: email
                  example: usuario@empresa.com
                senha:
                  type: string
                  example: sua_senha_secreta
      responses:
        '200':
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                type: object
                properties:
                  codigo:
                    type: integer
                    example: 200
                  retorno:
                    type: object
                    properties:
                      token:
                        type: string
                      refreshToken:
                        type: string
                      expiresIn:
                        type: string
                required:
                  - codigo
                  - retorno
              examples:
                sucesso:
                  value:
                    codigo: 200
                    retorno:
                      token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      refreshToken: "AEu4IL08w3D..._refresh_token"
                      expiresIn: "3600"
        '400':
          description: Erro de validação no login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErroValidacao'
        '500':
          description: Erro interno ao realizar login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErroInterno'

  /inteligencia-negocio/leads-por-cidade:
    get:
      tags:
        - Inteligência de Negócios
      summary: Listar leads por cidade
      description: Retorna leads (empresas) para uma determinada cidade e UF.
      security:
        - bearerAuth: []
      parameters:
        - name: cidade
          in: query
          required: true
          description: Nome da cidade para consulta.
          schema:
            type: string
          example: Birigui
        - name: uf
          in: query
          required: true
          description: Sigla da unidade federativa.
          schema:
            type: string
          example: SP
        - name: limite
          in: query
          required: false
          description: Quantidade máxima de registros retornados (mín. 1, máx. 20).
          schema:
            type: integer
            minimum: 1
            maximum: 20
          example: 20
        - name: x-empresa-id
          in: header
          required: true
          description: Identificador da empresa do cliente integrador.
          schema:
            type: string
          example: ID-EMPRESA
        - name: x-perfil-icp-id
          in: header
          required: false
          description: ID do perfil ICP (Ideal Customer Profile) a ser considerado na consulta.
          schema:
            type: string
          example: 1234567890abcdef
      responses:
        '200':
          description: Consulta de leads realizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  codigo:
                    type: integer
                    example: 200
                  filtro:
                    type: object
                    properties:
                      cidade:
                        type: string
                      uf:
                        type: string
                  idConsulta:
                    type: string
                  retorno:
                    type: array
                    items:
                      $ref: '#/components/schemas/LeadPorCidade'
                required:
                  - codigo
                  - filtro
                  - idConsulta
                  - retorno
              examples:
                exemplo:
                  value:
                    codigo: 200
                    filtro:
                      cidade: "Birigui"
                      uf: "SP"
                    idConsulta: "oy1ShqthokYO9FXJVj2q"
                    retorno:
                      - tipoCNPJ: "MATRIZ"
                        cnpjCompleto: "05102903000105"
