          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErroValidacao'
        '401':
          description: Não autorizado (token inválido ou ausente)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErroNaoAutorizado'
        '500':
          description: Erro interno ao processar a consulta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErroInterno'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LeadPorCidade:
      type: object
      properties:
        tipoCNPJ:
          type: string
        cnpjCompleto:
          type: string
        razaoSocial:
          type: string
        nomeFantasia:
          type: string
        situacaoCadastral:
          type: string
        naturezaJuridica:
          type: string
        mei:
          type: string
        simples:
          type: string
        porte:
          type: string
        cidade:
          type: string
        uf:
          type: string
        bairro:
          type: string
        enderecoNumero:
          type: string
        telefone:
          type: string
        email:
          type: string
        dataAbertura:
          type: string
          format: date
        atividadeEconomica:
          type: string
        enderecoCompleto:
          type: string
        endereco:
          type: string
        cep:
          type: string
        empresaCliente:
          type: string
        empresaProspect:
          type: string
        indicadorAtividade:
          type: object
          properties:
            faixaFaturamento:
              type: string
            numeroFuncionarios:
              type: string
            queryId:
              type: string
        fotos:
          type: array
          items:
            type: string
        sites:
          type: array
          items:
            type: string
        emails:
          type: array
          items:
            type: string
        telefones:
          type: array
          items:
            type: string
        redesSociais:
          type: array
          items:
            type: string
        possuiPresencaDigital:
          type: string
        notaICP:
          nullable: true
        classificacaoICP:
          nullable: true
        descricaoClassificacaoICP:
          nullable: true
        atividadeEconomicaSk:
          type: string
        municipioSk:
          type: string
        tipoLogradouro:
          type: string

    ErroValidacao:
      type: object
      properties:
        codigo:
          type: integer
          example: 400
        mensagem:
          type: string
        i18n:
          type: object
          properties:
            chave:
              type: string
        retorno:
          type: object
      required:
        - codigo
        - mensagem

    ErroNaoAutorizado:
      type: object
      properties:
        codigo:
          type: integer
          example: 401
        mensagem:
          type: string
      required:
        - codigo
        - mensagem

    ErroInterno:
      type: object
      properties:
        codigo:
          type: integer
          example: 500
        mensagem:
          type: string
        i18n:
          type: object
          properties:
            chave:
              type: string
      required:
        - codigo
        - mensagem

